name: "voidlink 1008 — VoidLink agent WebSocket channel (GET /ws/agent?token=)"

rule: >-
  alert http $HOME_NET any -> any 3100 (msg:"C2 VoidLink agent WebSocket channel (GET /ws/agent)";
  flow:to_server,established;
  http.method; content:"GET";
  http.uri; content:"/ws/agent?token=";
  http.header; content:"Upgrade"; content:"websocket"; distance:0; within:30;
  classtype:trojan-activity; sid:1000231008; rev:2;
  metadata:created_at 2026-06-07;)

tests:
  - name: "positive-ws-upgrade-with-token"
    expected_sids: [1000231008]
    request:
      method: GET
      uri: /ws/agent?token=TRTySbI_5DSHStH74OPZLEl1xJl_VO1ltxv231eplMuYl2hQemgerQ
      host: 213.108.21.95
      port: 3100
      headers:
        Upgrade: websocket
        Connection: Upgrade
        Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==
        Sec-WebSocket-Version: "13"

  - name: "negative-no-token-param"
    expected_sids: []
    request:
      method: GET
      uri: /ws/agent
      host: 213.108.21.95
      port: 3100
      headers:
        Upgrade: websocket
        Connection: Upgrade

  - name: "negative-no-upgrade-header"
    expected_sids: []
    request:
      method: GET
      uri: /ws/agent?token=abc123
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-wrong-port"
    expected_sids: []
    request:
      method: GET
      uri: /ws/agent?token=abc123
      host: 10.0.0.50
      port: 80
      headers:
        Upgrade: websocket
        Connection: Upgrade

  - name: "negative-different-ws-path"
    expected_sids: []
    request:
      method: GET
      uri: /ws/dashboard?token=abc123
      host: 213.108.21.95
      port: 3100
      headers:
        Upgrade: websocket
        Connection: Upgrade
