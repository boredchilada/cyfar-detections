name: "voidlink 1009 — VoidLink agent binary download (fleet-agent-linux)"

rule: >-
  alert http $HOME_NET any -> any 3100 (msg:"C2 VoidLink agent binary download (fleet-agent-linux)";
  flow:to_server,established;
  http.method; content:"GET";
  http.uri; content:"/downloads/fleet-agent-linux-";
  classtype:trojan-activity; sid:1000231009; rev:2;
  metadata:created_at 2026-06-07;)

tests:
  - name: "positive-amd64-download"
    expected_sids: [1000231009]
    request:
      method: GET
      uri: /downloads/fleet-agent-linux-amd64
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "positive-arm64-download"
    expected_sids: [1000231009]
    request:
      method: GET
      uri: /downloads/fleet-agent-linux-arm64
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-wrong-port"
    expected_sids: []
    request:
      method: GET
      uri: /downloads/fleet-agent-linux-amd64
      host: 10.0.0.50
      port: 80
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-different-download"
    expected_sids: []
    request:
      method: GET
      uri: /downloads/tools-version.json
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-post-not-get"
    expected_sids: []
    request:
      method: POST
      uri: /downloads/fleet-agent-linux-amd64
      host: 213.108.21.95
      port: 3100
      headers:
        Content-Type: application/octet-stream
      body: >-
        data
