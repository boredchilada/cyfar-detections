name: "n4d 1000637001 — External MCP JSON-RPC initialize"

rule: >-
  alert http $EXTERNAL_NET any -> $HOME_NET any (msg:"MCP JSON-RPC initialize from external source";
  flow:to_server,established;
  http.method; content:"POST";
  http.request_body; content:"jsonrpc"; content:"initialize"; distance:0; within:80;
  content:"protocolVersion"; distance:0; within:120;
  classtype:attempted-admin; sid:1000637001; rev:1;
  metadata:created_at 2026_07_10, deployment Ingress;)

tests:
  - name: "positive-exact-n4d-payload"
    expected_sids: [1000637001]
    request:
      method: POST
      uri: /mcp
      host: target.example.com
      port: 80
      client_ip: "45.144.164.52"
      headers:
        Content-Type: application/json
        User-Agent: Go-http-client/1.1
      body: >-
        {"id":1,"jsonrpc":"2.0","method":"initialize","params":{"capabilities":{},"clientInfo":{"name":"n","version":"1"},"protocolVersion":"2024-11-05"}}

  - name: "positive-different-mcp-path"
    expected_sids: [1000637001]
    request:
      method: POST
      uri: /api/mcp
      host: target.example.com
      port: 80
      client_ip: "45.144.164.52"
      headers:
        Content-Type: application/json
      body: >-
        {"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"test","version":"0.1"},"capabilities":{}}}

  - name: "positive-sse-path"
    expected_sids: [1000637001]
    request:
      method: POST
      uri: /sse
      host: target.example.com
      port: 3000
      client_ip: "183.91.9.63"
      headers:
        Content-Type: application/json
      body: >-
        {"id":1,"jsonrpc":"2.0","method":"initialize","params":{"capabilities":{},"clientInfo":{"name":"n","version":"1"},"protocolVersion":"2024-11-05"}}

  - name: "negative-get-not-post"
    expected_sids: []
    request:
      method: GET
      uri: /mcp
      host: target.example.com
      port: 80
      client_ip: "45.144.164.52"
      headers:
        User-Agent: Go-http-client/1.1

  - name: "negative-tools-list-not-initialize"
    expected_sids: []
    request:
      method: POST
      uri: /mcp
      host: target.example.com
      port: 80
      client_ip: "45.144.164.52"
      headers:
        Content-Type: application/json
      body: >-
        {"id":2,"jsonrpc":"2.0","method":"tools/list","params":{}}

  - name: "negative-no-protocolVersion"
    expected_sids: []
    request:
      method: POST
      uri: /mcp
      host: target.example.com
      port: 80
      client_ip: "45.144.164.52"
      headers:
        Content-Type: application/json
      body: >-
        {"jsonrpc":"2.0","method":"initialize","params":{"capabilities":{}}}

  - name: "negative-regular-json-rpc"
    expected_sids: []
    request:
      method: POST
      uri: /api/v1/rpc
      host: target.example.com
      port: 80
      client_ip: "45.144.164.52"
      headers:
        Content-Type: application/json
      body: >-
        {"jsonrpc":"2.0","method":"getBalance","params":{"account":"0xdeadbeef"}}
