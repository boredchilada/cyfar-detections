name: "voidlink 1010 — VoidLink bootstrap install script fetch"

rule: >-
  alert http $HOME_NET any -> any 3100 (msg:"C2 VoidLink bootstrap install script fetch";
  flow:to_server,established;
  http.method; content:"GET";
  http.uri; content:"/api/bootstrap-install-script?key=";
  classtype:trojan-activity; sid:1000231010; rev:1;
  metadata:created_at 2026-06-07;)

tests:
  - name: "positive-bootstrap-fetch"
    expected_sids: [1000231010]
    request:
      method: GET
      uri: /api/bootstrap-install-script?key=TRTySbI_5DSHStH74OPZLEl1xJl_VO1ltxv231eplMuYl2hQemgerQ
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "positive-different-key"
    expected_sids: [1000231010]
    request:
      method: GET
      uri: /api/bootstrap-install-script?key=someOtherTokenValue123
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-no-key-param"
    expected_sids: []
    request:
      method: GET
      uri: /api/bootstrap-install-script
      host: 213.108.21.95
      port: 3100
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-wrong-port"
    expected_sids: []
    request:
      method: GET
      uri: /api/bootstrap-install-script?key=abc
      host: 10.0.0.50
      port: 80
      headers:
        User-Agent: curl/7.68.0

  - name: "negative-post-not-get"
    expected_sids: []
    request:
      method: POST
      uri: /api/bootstrap-install-script?key=abc
      host: 213.108.21.95
      port: 3100
      headers:
        Content-Type: application/json
      body: >-
        {"key":"abc"}
